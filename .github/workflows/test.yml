name: test

on:
  push:
    branches: [main]
    paths:
      - 'briefing.py'
      - 'test_briefing.py'
      - 'requirements.txt'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'briefing.py'
      - 'test_briefing.py'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Run regression tests
        run: python test_briefing.py
