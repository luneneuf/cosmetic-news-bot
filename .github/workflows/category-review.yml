name: category-review

on:
  # ⚠️ 별도 지시 전까지 자동 게시 보류 — cron 주석 해제 시 KST 금요일 08:30 점검
  # schedule:
  #   - cron: '30 23 * * 4'   # UTC 목 23:30 = KST 금 08:30 (브리핑 후)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Slack 미게시 — 로그로만 리포트 확인'
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore category_stats (독립 캐시)
        uses: actions/cache/restore@v4
        with:
          path: category_stats.jsonl
          key: news-bot-category-stats-${{ github.run_id }}
          restore-keys: |
            news-bot-category-stats-

      - name: Check stats
        run: |
          [ -f category_stats.jsonl ] && echo "category_stats.jsonl: $(wc -l < category_stats.jsonl) lines" || { touch category_stats.jsonl; echo "category_stats.jsonl: empty"; }

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Run weekly category review
        env:
          BRIEFING_SLACK_WEBHOOK_URL: ${{ secrets.BRIEFING_SLACK_WEBHOOK_URL }}
          LAKA_SLACK_BOT_TOKEN: ${{ secrets.LAKA_SLACK_BOT_TOKEN }}
          LAKA_SLACK_CHANNEL: ${{ secrets.LAKA_SLACK_CHANNEL }}
          BRIEFING_MODE: review
          BRIEFING_DRY_RUN: ${{ inputs.dry_run }}
        run: python briefing.py
