name: morning-briefing

on:
  schedule:
    - cron: '0 23 * * *'   # UTC 매일 23:00 = KST 매일 08:00 (주말 포함 — 한산한 날은 봇이 자체 처리)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Slack 미게시 — 로그로만 결과 확인'
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: morning-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore posted_log (독립 캐시 — state 버전 무관)
        uses: actions/cache/restore@v4
        with:
          path: posted_log.jsonl
          key: news-bot-posted-log-${{ github.run_id }}
          restore-keys: |
            news-bot-posted-log-

      - name: Restore category_stats (독립 캐시)
        uses: actions/cache/restore@v4
        with:
          path: category_stats.jsonl
          key: news-bot-category-stats-${{ github.run_id }}
          restore-keys: |
            news-bot-category-stats-

      - name: Check state
        run: |
          [ -f posted_log.jsonl ] && echo "posted_log.jsonl: $(wc -l < posted_log.jsonl) lines" || { touch posted_log.jsonl; echo "posted_log.jsonl: empty"; }
          [ -f category_stats.jsonl ] && echo "category_stats.jsonl: $(wc -l < category_stats.jsonl) lines" || { touch category_stats.jsonl; echo "category_stats.jsonl: empty"; }

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Run briefing
        env:
          BRIEFING_SLACK_WEBHOOK_URL: ${{ secrets.BRIEFING_SLACK_WEBHOOK_URL }}
          LAKA_SLACK_BOT_TOKEN: ${{ secrets.LAKA_SLACK_BOT_TOKEN }}
          LAKA_SLACK_CHANNEL: ${{ secrets.LAKA_SLACK_CHANNEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRIEFING_DRY_RUN: ${{ inputs.dry_run }}
        run: python briefing.py

      - name: Save category_stats (독립 캐시)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: category_stats.jsonl
          key: news-bot-category-stats-${{ github.run_id }}-${{ github.run_attempt }}
