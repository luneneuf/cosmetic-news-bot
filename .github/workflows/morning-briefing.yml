name: morning-briefing

on:
  schedule:
    - cron: '0 23 * * 0-4'   # UTC 일~목 23:00 = KST 월~금 08:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Slack 미게시 — 로그로만 결과 확인'
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: morning-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore posted_log (일회성 테스트 — 어제 130건 든 옛 v8)
        uses: actions/cache/restore@v4
        with:
          path: |
            seen_links.json
            seen_titles.json
            seen_titles_embeddings.json
            seen_title_embeddings.json
            seen_titles_list.json
            posted_log.jsonl
          key: news-bot-seen-v8-26791055158-1

      - name: Check posted_log
        run: |
          if [ -f "posted_log.jsonl" ]; then
            echo "posted_log.jsonl: $(wc -l < posted_log.jsonl) lines"
          else
            echo "posted_log.jsonl: not found (cache miss or first run)"
            touch posted_log.jsonl
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Run briefing
        env:
          BRIEFING_SLACK_WEBHOOK_URL: ${{ secrets.BRIEFING_SLACK_WEBHOOK_URL }}
          LAKA_SLACK_BOT_TOKEN: ${{ secrets.LAKA_SLACK_BOT_TOKEN }}
          LAKA_SLACK_CHANNEL: ${{ secrets.LAKA_SLACK_CHANNEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRIEFING_DRY_RUN: ${{ inputs.dry_run }}
        run: python briefing.py
