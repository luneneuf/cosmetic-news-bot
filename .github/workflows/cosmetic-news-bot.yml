name: cosmetic-news-bot

on:
  schedule:
    # KST 09:00-17:45 평일 매 15분 (public repo라 Actions 한도 무제한)
    # UTC 00:00-08:45 월-금
    - cron: '*/15 0-8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: cosmetic-news-bot
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore seen_links cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: seen_links.json
          # primary key는 unique (매번 cache miss → 항상 save 트리거)
          # restore-keys로 가장 최근 cache fallback
          key: news-bot-seen-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            news-bot-seen-

      - name: Init empty state if cache miss
        run: |
          if [ ! -f seen_links.json ]; then
            echo '[]' > seen_links.json
            echo "cache miss — initialized empty state"
          else
            echo "restored cache: $(wc -c < seen_links.json) bytes"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Collect and post
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python collect_and_post.py

      - name: Save seen_links cache
        if: always()  # 워크플로 fail에도 save 보장
        uses: actions/cache/save@v4
        with:
          path: seen_links.json
          key: news-bot-seen-${{ github.run_id }}-${{ github.run_attempt }}
