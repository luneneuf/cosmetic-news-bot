name: cosmetic-news-bot

on:
  schedule:
    # KST 09:00-17:45 매일 매 15분 (public repo라 Actions 한도 무제한)
    # UTC 00:00-08:45 — 주말 포함 (주말 뉴스가 있어야 주말 아침 브리핑에 실림)
    - cron: '*/15 0-8 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: cosmetic-news-bot
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore state cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            seen_links.json
            seen_titles.json
            seen_titles_embeddings.json
            seen_title_embeddings.json
            seen_titles_list.json
          key: news-bot-seen-v8-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            news-bot-seen-v8-

      - name: Restore posted_log cache (독립 캐시 — 버전 무관)
        uses: actions/cache/restore@v4
        with:
          path: posted_log.jsonl
          key: news-bot-posted-log-${{ github.run_id }}
          restore-keys: |
            news-bot-posted-log-

      - name: Init empty state if cache miss
        run: |
          for f in seen_links.json seen_titles.json seen_titles_embeddings.json seen_title_embeddings.json seen_titles_list.json; do
            if [ ! -f "$f" ]; then
              echo '[]' > "$f"
              echo "$f: initialized empty"
            else
              echo "$f: $(wc -c < "$f") bytes"
            fi
          done
          if [ ! -f "posted_log.jsonl" ]; then
            touch posted_log.jsonl
            echo "posted_log.jsonl: initialized empty"
          else
            echo "posted_log.jsonl: $(wc -l < posted_log.jsonl) lines"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Collect and post
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LAKA_SLACK_BOT_TOKEN: ${{ secrets.LAKA_SLACK_BOT_TOKEN }}
          LAKA_NEWS_SLACK_CHANNEL: ${{ secrets.LAKA_NEWS_SLACK_CHANNEL }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python collect_and_post.py

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen_links.json
            seen_titles.json
            seen_titles_embeddings.json
            seen_title_embeddings.json
            seen_titles_list.json
          key: news-bot-seen-v8-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Save posted_log cache (독립 캐시 — 버전 무관)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: posted_log.jsonl
          key: news-bot-posted-log-${{ github.run_id }}-${{ github.run_attempt }}
